<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數據分析 - 智慧記帳</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; }
        .gradient-text {
            background: linear-gradient(135deg, #4299E1, #38A169);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .chart-container {
            height: 400px;
        }
        .number-animation {
            font-variant-numeric: tabular-nums;
        }
        .income { color: #38A169; }
        .expense { color: #E53E3E; }
        .floating-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        .particle {
            position: absolute;
            background: rgba(66, 153, 225, 0.1);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm fixed w-full top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-bold text-gray-800">💰 智慧記帳</h1>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="index.html" class="text-gray-600 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">記帳</a>
                        <a href="analytics.html" class="bg-blue-100 text-blue-700 px-3 py-2 rounded-md text-sm font-medium">分析</a>
                        <a href="budget.html" class="text-gray-600 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">預算</a>
                    </div>
                </div>
                <div class="md:hidden">
                    <button id="mobile-menu-button" class="text-gray-600 hover:text-gray-900">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile menu -->
        <div id="mobile-menu" class="md:hidden hidden">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 bg-white border-t">
                <a href="index.html" class="text-gray-600 hover:text-gray-900 block px-3 py-2 rounded-md text-base font-medium">記帳</a>
                <a href="analytics.html" class="bg-blue-100 text-blue-700 block px-3 py-2 rounded-md text-base font-medium">分析</a>
                <a href="budget.html" class="text-gray-600 hover:text-gray-900 block px-3 py-2 rounded-md text-base font-medium">預算</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="pt-16 pb-8 relative overflow-hidden">
        <div class="floating-particles">
            <div class="particle" style="width: 12px; height: 12px; left: 15%; animation-delay: 0s;"></div>
            <div class="particle" style="width: 8px; height: 8px; left: 25%; animation-delay: 2s;"></div>
            <div class="particle" style="width: 15px; height: 15px; left: 35%; animation-delay: 4s;"></div>
            <div class="particle" style="width: 10px; height: 10px; left: 45%; animation-delay: 1s;"></div>
            <div class="particle" style="width: 6px; height: 6px; left: 55%; animation-delay: 3s;"></div>
            <div class="particle" style="width: 14px; height: 14px; left: 65%; animation-delay: 5s;"></div>
            <div class="particle" style="width: 9px; height: 9px; left: 75%; animation-delay: 6s;"></div>
        </div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div class="text-center">
                <h2 class="text-4xl font-bold gradient-text mb-4">財務數據分析</h2>
                <p class="text-xl text-gray-600 mb-6">深入了解您的收支狀況，做出明智的財務決策</p>
                <div class="flex justify-center space-x-4">
                    <select id="time-range" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="3">最近3個月</option>
                        <option value="6">最近6個月</option>
                        <option value="12">最近1年</option>
                    </select>
                </div>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-12">
        <!-- Key Metrics -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow-md p-6 card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">總收入</p>
                        <p id="total-income" class="text-2xl font-bold income number-animation">NT$ 0</p>
                    </div>
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                        <span class="text-green-600 text-xl">💰</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6 card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">總支出</p>
                        <p id="total-expense" class="text-2xl font-bold expense number-animation">NT$ 0</p>
                    </div>
                    <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
                        <span class="text-red-600 text-xl">💸</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6 card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">淨結餘</p>
                        <p id="net-balance" class="text-2xl font-bold number-animation">NT$ 0</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <span class="text-blue-600 text-xl">📊</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6 card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">儲蓄率</p>
                        <p id="savings-rate" class="text-2xl font-bold number-animation">0%</p>
                    </div>
                    <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                        <span class="text-purple-600 text-xl">🎯</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Monthly Trend Chart -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-semibold text-gray-800">月度收支趨勢</h3>
                    <div class="flex space-x-2">
                        <button id="trend-income" class="px-3 py-1 text-sm bg-green-100 text-green-700 rounded-md">收入</button>
                        <button id="trend-expense" class="px-3 py-1 text-sm bg-red-100 text-red-700 rounded-md">支出</button>
                        <button id="trend-both" class="px-3 py-1 text-sm bg-blue-100 text-blue-700 rounded-md">全部</button>
                    </div>
                </div>
                <div id="monthly-trend-chart" class="chart-container"></div>
            </div>

            <!-- Category Pie Chart -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-semibold text-gray-800">支出分類佔比</h3>
                    <select id="pie-time-range" class="px-3 py-1 text-sm border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="current">本月</option>
                        <option value="3">最近3個月</option>
                        <option value="6">最近6個月</option>
                        <option value="12">最近1年</option>
                    </select>
                </div>
                <div id="category-pie-chart" class="chart-container"></div>
            </div>
        </div>

        <!-- Category Analysis -->
        <div class="bg-white rounded-lg shadow-md mb-8">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">分類支出分析</h3>
            </div>
            <div class="p-6">
                <div id="category-analysis-container" class="space-y-4">
                    <!-- Category analysis items will be inserted here -->
                </div>
            </div>
        </div>

        <!-- Monthly Summary Table -->
        <div class="bg-white rounded-lg shadow-md">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">月度統計明細</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">月份</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">收入</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">支出</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">結餘</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">儲蓄率</th>
                        </tr>
                    </thead>
                    <tbody id="monthly-summary-table" class="bg-white divide-y divide-gray-200">
                        <!-- Monthly summary rows will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="text-center text-gray-600">
                <p>&copy; 2024 智慧記帳. 讓財務管理變得簡單有趣.</p>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
    <script>
        // Initialize analytics page
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof window.FinanceApp !== 'undefined') {
                window.FinanceApp.initAnalytics();
            }
        });
    </script>
</body>
</html>
