<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>預算管理 - 智慧記帳</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; }
        .gradient-text {
            background: linear-gradient(135deg, #4299E1, #38A169);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .progress-bar {
            transition: width 0.5s ease-in-out;
        }
        .floating-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        .particle {
            position: absolute;
            background: rgba(66, 153, 225, 0.1);
            border-radius: 50%;
            animation: float 10s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-40px) rotate(180deg); }
        }
        .number-animation {
            font-variant-numeric: tabular-nums;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .budget-warning { background-color: #FEF2F2; border-color: #FECACA; }
        .budget-success { background-color: #F0FDF4; border-color: #BBF7D0; }
        .budget-danger { background-color: #FEF2F2; border-color: #FCA5A5; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm fixed w-full top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-bold text-gray-800">💰 智慧記帳</h1>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="index.html" class="text-gray-600 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">記帳</a>
                        <a href="analytics.html" class="text-gray-600 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">分析</a>
                        <a href="budget.html" class="bg-blue-100 text-blue-700 px-3 py-2 rounded-md text-sm font-medium">預算</a>
                    </div>
                </div>
                <div class="md:hidden">
                    <button id="mobile-menu-button" class="text-gray-600 hover:text-gray-900">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile menu -->
        <div id="mobile-menu" class="md:hidden hidden">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 bg-white border-t">
                <a href="index.html" class="text-gray-600 hover:text-gray-900 block px-3 py-2 rounded-md text-base font-medium">記帳</a>
                <a href="analytics.html" class="text-gray-600 hover:text-gray-900 block px-3 py-2 rounded-md text-base font-medium">分析</a>
                <a href="budget.html" class="bg-blue-100 text-blue-700 block px-3 py-2 rounded-md text-base font-medium">預算</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="pt-16 pb-8 relative overflow-hidden">
        <div class="floating-particles">
            <div class="particle" style="width: 10px; height: 10px; left: 12%; animation-delay: 0s;"></div>
            <div class="particle" style="width: 14px; height: 14px; left: 22%; animation-delay: 3s;"></div>
            <div class="particle" style="width: 8px; height: 8px; left: 32%; animation-delay: 6s;"></div>
            <div class="particle" style="width: 16px; height: 16px; left: 42%; animation-delay: 1s;"></div>
            <div class="particle" style="width: 12px; height: 12px; left: 52%; animation-delay: 4s;"></div>
            <div class="particle" style="width: 9px; height: 9px; left: 62%; animation-delay: 7s;"></div>
            <div class="particle" style="width: 15px; height: 15px; left: 72%; animation-delay: 2s;"></div>
            <div class="particle" style="width: 11px; height: 11px; left: 82%; animation-delay: 5s;"></div>
        </div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div class="text-center">
                <h2 class="text-4xl font-bold gradient-text mb-4">預算管理</h2>
                <p class="text-xl text-gray-600 mb-6">設定預算目標，控制支出，實現財務自由</p>
                <div class="flex justify-center space-x-4">
                    <button id="set-budget-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition-colors duration-200">
                        設定預算
                    </button>
                    <button id="reset-budget-btn" class="bg-gray-600 hover:bg-gray-700 text-white px-6 py-2 rounded-lg font-medium transition-colors duration-200">
                        重置預算
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-12">
        <!-- Budget Overview -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow-md p-6 card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">總預算</p>
                        <p id="total-budget" class="text-2xl font-bold text-blue-600 number-animation">NT$ 0</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <span class="text-blue-600 text-xl">🎯</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6 card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">已使用</p>
                        <p id="total-spent" class="text-2xl font-bold text-red-600 number-animation">NT$ 0</p>
                    </div>
                    <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
                        <span class="text-red-600 text-xl">💸</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6 card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">剩餘預算</p>
                        <p id="remaining-budget" class="text-2xl font-bold text-green-600 number-animation">NT$ 0</p>
                    </div>
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                        <span class="text-green-600 text-xl">💰</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Budget Progress -->
        <div class="bg-white rounded-lg shadow-md mb-8">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">預算使用進度</h3>
            </div>
            <div class="p-6">
                <div class="mb-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm font-medium text-gray-600">整體預算使用率</span>
                        <span id="overall-usage-percent" class="text-sm font-medium text-gray-600">0%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-3">
                        <div id="overall-usage-bar" class="bg-gradient-to-r from-green-400 to-blue-500 h-3 rounded-full progress-bar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Category Budgets -->
        <div class="bg-white rounded-lg shadow-md mb-8">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">分類預算管理</h3>
            </div>
            <div id="category-budgets-container" class="p-6 space-y-6">
                <!-- Category budget items will be inserted here -->
            </div>
        </div>

        <!-- Budget vs Actual Chart -->
        <div class="bg-white rounded-lg shadow-md mb-8">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">預算 vs 實際支出</h3>
            </div>
            <div class="p-6">
                <div id="budget-comparison-chart" style="height: 400px;"></div>
            </div>
        </div>

        <!-- Budget Alerts -->
        <div class="bg-white rounded-lg shadow-md">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">預算提醒</h3>
            </div>
            <div class="p-6">
                <div id="budget-alerts-container">
                    <div class="text-center text-gray-500 py-8">
                        <div class="text-4xl mb-4">🔔</div>
                        <p>暫無預算提醒</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Set Budget Modal -->
    <div id="set-budget-modal" class="modal">
        <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4 transform transition-all">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">設定預算</h3>
            </div>
            <form id="set-budget-form" class="px-6 py-4">
                <div class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">餐飲預算</label>
                            <input type="number" id="budget-餐飲" step="0.01" min="0"
                                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                   placeholder="NT$">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">交通預算</label>
                            <input type="number" id="budget-交通" step="0.01" min="0"
                                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                   placeholder="NT$">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">購物預算</label>
                            <input type="number" id="budget-購物" step="0.01" min="0"
                                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                   placeholder="NT$">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">娛樂預算</label>
                            <input type="number" id="budget-娛樂" step="0.01" min="0"
                                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                   placeholder="NT$">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">其他預算</label>
                            <input type="number" id="budget-其他" step="0.01" min="0"
                                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                   placeholder="NT$">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">總預算</label>
                            <input type="number" id="total-budget-input" step="0.01" min="0"
                                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-gray-100"
                                   placeholder="NT$" readonly>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">預算月份</label>
                        <input type="month" id="budget-month" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                </div>
                <div class="flex justify-end space-x-3 mt-6">
                    <button type="button" id="budget-cancel-btn" 
                            class="px-4 py-2 text-gray-600 border border-gray-300 rounded-md hover:bg-gray-50 transition-colors duration-200">
                        取消
                    </button>
                    <button type="submit" 
                            class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors duration-200">
                        設定預算
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="text-center text-gray-600">
                <p>&copy; 2024 智慧記帳. 讓財務管理變得簡單有趣.</p>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
    <script>
        // Initialize budget page
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof window.FinanceApp !== 'undefined') {
                window.FinanceApp.initBudget();
            }
        });
    </script>
</body>
</html>
