<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧記帳 - 個人財務管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; }
        .gradient-text {
            background: linear-gradient(135deg, #4299E1, #38A169);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .floating-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        .particle {
            position: absolute;
            background: rgba(66, 153, 225, 0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        .income { color: #38A169; }
        .expense { color: #E53E3E; }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .number-animation {
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm fixed w-full top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-bold text-gray-800">💰 智慧記帳</h1>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="index.html" class="bg-blue-100 text-blue-700 px-3 py-2 rounded-md text-sm font-medium">記帳</a>
                        <a href="analytics.html" class="text-gray-600 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">分析</a>
                        <a href="budget.html" class="text-gray-600 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">預算</a>
                    </div>
                </div>
                <div class="md:hidden">
                    <button id="mobile-menu-button" class="text-gray-600 hover:text-gray-900">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile menu -->
        <div id="mobile-menu" class="md:hidden hidden">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 bg-white border-t">
                <a href="index.html" class="bg-blue-100 text-blue-700 block px-3 py-2 rounded-md text-base font-medium">記帳</a>
                <a href="analytics.html" class="text-gray-600 hover:text-gray-900 block px-3 py-2 rounded-md text-base font-medium">分析</a>
                <a href="budget.html" class="text-gray-600 hover:text-gray-900 block px-3 py-2 rounded-md text-base font-medium">預算</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="pt-16 pb-8 relative overflow-hidden">
        <div class="floating-particles">
            <div class="particle" style="width: 10px; height: 10px; left: 10%; animation-delay: 0s;"></div>
            <div class="particle" style="width: 15px; height: 15px; left: 20%; animation-delay: 1s;"></div>
            <div class="particle" style="width: 8px; height: 8px; left: 30%; animation-delay: 2s;"></div>
            <div class="particle" style="width: 12px; height: 12px; left: 40%; animation-delay: 3s;"></div>
            <div class="particle" style="width: 6px; height: 6px; left: 50%; animation-delay: 4s;"></div>
            <div class="particle" style="width: 14px; height: 14px; left: 60%; animation-delay: 5s;"></div>
        </div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div class="text-center">
                <h2 class="text-4xl font-bold gradient-text mb-4">掌握財務，規劃未來</h2>
                <p class="text-xl text-gray-600 mb-8">輕鬆記錄每一筆收支，智能分析財務狀況</p>
                <button id="add-record-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg text-lg font-medium transition-colors duration-200 shadow-lg hover:shadow-xl">
                    新增記錄
                </button>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-12">
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow-md p-6 card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">本月收入</p>
                        <p id="monthly-income" class="text-2xl font-bold income number-animation">NT$ 0</p>
                    </div>
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                        <span class="text-green-600 text-xl">📈</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6 card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">本月支出</p>
                        <p id="monthly-expense" class="text-2xl font-bold expense number-animation">NT$ 0</p>
                    </div>
                    <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
                        <span class="text-red-600 text-xl">📉</span>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6 card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-600">本月結餘</p>
                        <p id="monthly-balance" class="text-2xl font-bold number-animation">NT$ 0</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <span class="text-blue-600 text-xl">💰</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filters and Search -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <div class="flex flex-col md:flex-row gap-4 items-center">
                <div class="flex-1">
                    <input type="text" id="search-input" placeholder="搜索備註..." 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div class="flex gap-2">
                    <select id="category-filter" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="">所有分類</option>
                        <option value="餐飲">餐飲</option>
                        <option value="交通">交通</option>
                        <option value="購物">購物</option>
                        <option value="娛樂">娛樂</option>
                        <option value="薪資">薪資</option>
                        <option value="投資">投資</option>
                        <option value="其他">其他</option>
                    </select>
                    <select id="type-filter" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="">所有類型</option>
                        <option value="income">收入</option>
                        <option value="expense">支出</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Records List -->
        <div class="bg-white rounded-lg shadow-md">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">收支記錄</h3>
            </div>
            <div id="records-container" class="divide-y divide-gray-200">
                <!-- Records will be dynamically inserted here -->
                <div class="px-6 py-8 text-center text-gray-500">
                    <div class="text-4xl mb-4">📝</div>
                    <p>暫無記錄，點擊上方按鈕新增第一筆記錄</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Add Record Modal -->
    <div id="add-modal" class="modal">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4 transform transition-all">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">新增記錄</h3>
            </div>
            <form id="add-record-form" class="px-6 py-4">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">金額</label>
                        <input type="number" id="amount-input" step="0.01" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="請輸入金額">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">類型</label>
                        <select id="type-input" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="">請選擇類型</option>
                            <option value="income">收入</option>
                            <option value="expense">支出</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">分類</label>
                        <select id="category-input" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="">請選擇分類</option>
                            <option value="餐飲">🍽️ 餐飲</option>
                            <option value="交通">🚗 交通</option>
                            <option value="購物">🛍️ 購物</option>
                            <option value="娛樂">🎬 娛樂</option>
                            <option value="薪資">💼 薪資</option>
                            <option value="投資">📈 投資</option>
                            <option value="其他">📦 其他</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">日期</label>
                        <input type="date" id="date-input" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">備註</label>
                        <textarea id="note-input" rows="3"
                                  class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                  placeholder="請輸入備註（選填）"></textarea>
                    </div>
                </div>
                <div class="flex justify-end space-x-3 mt-6">
                    <button type="button" id="cancel-btn" 
                            class="px-4 py-2 text-gray-600 border border-gray-300 rounded-md hover:bg-gray-50 transition-colors duration-200">
                        取消
                    </button>
                    <button type="submit" 
                            class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors duration-200">
                        保存
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Record Modal -->
    <div id="edit-modal" class="modal">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4 transform transition-all">
            <div class="px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-semibold text-gray-800">編輯記錄</h3>
            </div>
            <form id="edit-record-form" class="px-6 py-4">
                <input type="hidden" id="edit-record-id">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">金額</label>
                        <input type="number" id="edit-amount-input" step="0.01" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="請輸入金額">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">類型</label>
                        <select id="edit-type-input" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="income">收入</option>
                            <option value="expense">支出</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">分類</label>
                        <select id="edit-category-input" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="餐飲">🍽️ 餐飲</option>
                            <option value="交通">🚗 交通</option>
                            <option value="購物">🛍️ 購物</option>
                            <option value="娛樂">🎬 娛樂</option>
                            <option value="薪資">💼 薪資</option>
                            <option value="投資">📈 投資</option>
                            <option value="其他">📦 其他</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">日期</label>
                        <input type="date" id="edit-date-input" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">備註</label>
                        <textarea id="edit-note-input" rows="3"
                                  class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                  placeholder="請輸入備註（選填）"></textarea>
                    </div>
                </div>
                <div class="flex justify-between items-center mt-6">
                    <button type="button" id="delete-btn" 
                            class="px-4 py-2 text-red-600 border border-red-300 rounded-md hover:bg-red-50 transition-colors duration-200">
                        刪除
                    </button>
                    <div class="flex space-x-3">
                        <button type="button" id="edit-cancel-btn" 
                                class="px-4 py-2 text-gray-600 border border-gray-300 rounded-md hover:bg-gray-50 transition-colors duration-200">
                            取消
                        </button>
                        <button type="submit" 
                                class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors duration-200">
                            保存
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="text-center text-gray-600">
                <p>&copy; 2024 智慧記帳. 讓財務管理變得簡單有趣.</p>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
